services:
  mosquee-zn-gestion:
    image: nginx:alpine
    container_name: mosquee-zn-gestion
    volumes:
      - ~/workspace/mosquee-zn/client/gestion:/usr/share/nginx/html:ro
      - ~/workspace/mosquee-zn/client/gestion/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "30901:80"
    restart: unless-stopped
