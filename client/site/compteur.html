<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Compteur TV | Mosquée Lumière et Piété</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/compteur.css">
</head>
<body>
    <main class="ecran-tv">
        <div class="compteur-container">
            
            <div class="compteur-header">
                <h1 class="compteur-title">
                    <span class="compteur-subtitle">Mosqué du Quartier Valdegour</span>
                    ZUP NORD / ZN
                </h1>
            </div>

            <div class="compteur-card" id="main-card">
                <div class="compteur-success" id="compteur-success" style="display: block; margin-bottom: 0;">
                    <div class="success-icon"><i class="fa-solid fa-mosque"></i></div>
                    <h2 class="success-title">Bienvenue !</h2>
                    <p style="margin-top: 20px; font-size: 2.5rem; color: var(--m-text-light); font-weight: 700;">Votre Mosquée au cœur de la communauté</p>
                </div>
            </div>
            
        </div>
    </main>
    
    <script src="assets/js/compteur.js"></script>
</body>
</html>
