services:
  mosquee-zn:
    image: nginx:alpine
    container_name: mosquee-zn
    volumes:
      - ~/workspace/mosquee-zn/client/site:/usr/share/nginx/html:ro
      - ~/workspace/mosquee-zn/client/site/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "30902:80"
    restart: unless-stopped
