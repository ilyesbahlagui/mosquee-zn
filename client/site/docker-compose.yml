services:
  mosquee-zn:
    image: nginx:alpine
    container_name: mosquee-zn
    volumes:
      - /root/dev/mosquee-zn/client/site:/usr/share/nginx/html:ro
      - /root/dev/mosquee-zn/client/site/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - npm_network

networks:
  npm_network:
    external: true
    name: nginx-proxy-manager_default